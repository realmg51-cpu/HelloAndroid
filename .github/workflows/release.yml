name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
    
    - name: Debug - List files
      run: |
        ls -la gradle/wrapper/ 2>/dev/null || echo "No wrapper dir"
        cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "No properties"
    
    - name: Regenerate Gradle Wrapper
      run: |
        sudo apt-get update
        sudo apt-get install gradle -y
        rm -rf gradle/wrapper gradlew gradlew.bat
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
